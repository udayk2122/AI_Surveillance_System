<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | GuardianAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <div id="navbar-container"></div>

    <div class="auth-container mt-5">
        <div class="auth-card">
            <div class="auth-image" style="background-image: url('https://img.lovepik.com/photo/45009/7677.jpg_wh860.jpg');">
                <div class="auth-text">
                    <i class="fa-solid fa-shield-halved mb-4 text-warning" style="font-size: 4rem;"></i>
                    <h2 class="fw-bold display-6">Join Us!</h2>
                    <p class="mt-3 fs-5">Create an account to access real-time <strong>Advanced Gun Detection Surveillance</strong>.</p>
                </div>
            </div>
            <div class="auth-form">
                <form id="regForm" onsubmit="return false;">
                    <h3 class="fw-bold mb-2">Create Account</h3>
                    <p class="text-muted mb-4 small">Please fill in your details.</p>

                    <label class="form-label text-muted small fw-bold text-uppercase">Full Name</label>
                    <input type="text" id="regName" class="input-field" placeholder="John Doe" required>

                    <label class="form-label text-muted small fw-bold text-uppercase">Email</label>
                    <input type="email" id="regEmail" class="input-field" placeholder="admin@guardianai.com" required>

                    <label class="form-label text-muted small fw-bold text-uppercase">Password</label>
                    <input type="password" id="regPass" class="input-field" placeholder="••••••••" required minlength="6">

                    <button type="submit" class="btn-auth mt-3" id="sendBtn">
                        <i class="fa-solid fa-paper-plane me-2"></i> Send OTP
                    </button>
                </form>

                <form id="otpSection" style="display: none; text-align: center;" onsubmit="return false;">
                    <i class="fas fa-envelope-open-text fa-3x text-primary mb-3"></i>
                    <h3 class="fw-bold mb-2">Verify Email</h3>
                    <p class="text-muted mb-4 small">Enter the 6-digit code sent to your email.</p>

                    <input type="text" id="otpInput" class="input-field text-center fs-4 fw-bold mx-auto"
                        placeholder="••••••" maxlength="6" style="letter-spacing: 10px; max-width: 250px;" required>

                    <button type="submit" class="btn-auth bg-success" id="verifyBtn">
                        <i class="fa-solid fa-check-circle me-2"></i> Verify & Register
                    </button>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">Already have an account? <a href="login.html" class="fw-bold text-primary text-decoration-none">Login</a></small>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
