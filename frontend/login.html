<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | GuardianAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100" style="padding-top: 70px;">

    <div id="navbar-container" style="position: relative; z-index: 2000 !important;"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-image" style="background-image: url('https://wallup.net/wp-content/uploads/2018/10/05/908908-gun-weapon-guns-weapons-rifle-military-machine-assault-police-swat.jpg');">
                <div class="auth-text">
                    <i class="fa-solid fa-shield-halved mb-4 text-warning" style="font-size: 4rem;"></i>
                    <h2 class="fw-bold display-6">Security Access</h2>
                    <p class="mt-3 fs-5">Log in to the <strong>GuardianAI</strong> command center.</p>
                </div>
            </div>

            <div class="auth-form">
                <div id="loginFormSection">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold mb-2">Sign In</h3>
                        <p class="text-muted small">Enter your credentials to continue.</p>
                    </div>

                    <form id="loginForm" onsubmit="return false;">
                        <label class="form-label text-muted small fw-bold text-uppercase">Email Address</label>
                        <input type="email" id="emailInput" class="input-field" placeholder="admin@guardianai.com" required>

                        <label class="form-label text-muted small fw-bold text-uppercase">Password</label>
                        <input type="password" id="passInput" class="input-field" placeholder="••••••••" required>

                        <div class="text-end mb-4">
                            <a href="javascript:void(0)" onclick="toggleForgot(true)" class="small text-danger text-decoration-none fw-bold">Forgot Password?</a>
                        </div>

                        <button type="submit" id="loginBtn" class="btn-auth">
                            <i class="fa-solid fa-right-to-bracket me-2"></i> Login Securely
                        </button>
                    </form>
                </div>

                <div id="forgotFormSection" class="d-none">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold mb-2">Reset Password</h3>
                        <p class="text-muted small">Verify your email to create a new password.</p>
                    </div>

                    <form id="forgotRequestForm" onsubmit="return false;">
                        <label class="form-label text-muted small fw-bold text-uppercase">Registered Email</label>
                        <input type="email" id="forgotEmail" class="input-field" placeholder="your@email.com" required>
                        <button type="submit" id="forgotSendBtn" class="btn-auth mb-3">Send Reset OTP</button>
                    </form>

                    <form id="forgotResetForm" class="d-none" onsubmit="return false;">
                        <input type="text" id="forgotOTP" class="input-field text-center fs-4 fw-bold" placeholder="OTP Code" maxlength="6">
                        <input type="password" id="newPass" class="input-field" placeholder="New Password" required minlength="6">
                        <button type="submit" id="resetBtn" class="btn-auth bg-success">Update Password</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="javascript:void(0)" onclick="toggleForgot(false)" class="small text-muted text-decoration-none fw-bold"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <small class="text-muted">New here? <a href="register.html" class="fw-bold text-primary text-decoration-none">Create an Account</a></small>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script>
        function toggleForgot(show) {
            document.getElementById('loginFormSection').classList.toggle('d-none', show);
            document.getElementById('forgotFormSection').classList.toggle('d-none', !show);
        }
    </script>
</body>
</html>
